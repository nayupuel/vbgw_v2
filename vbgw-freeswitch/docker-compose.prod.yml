# docker-compose.prod.yml — Production 오버레이
# 변경이력: v1.0.0 | 2026-04-07 | [Implementer] | Phase 4 | TLS/SRTP 강제 + 로그 제한 + 리소스
# 변경이력: v1.1.0 | 2026-04-09 | [Implementer] | T-06,T-14,T-28 | audio_fork TLS, FS restart policy, gRPC deadline
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.9"

services:
  freeswitch:
    # T-14: Override restart policy — on-failure prevents infinite crash loop in compose mode
    restart: on-failure:5
    environment:
      - SIP_TLS_ONLY=true
      - SRTP_MODE=mandatory
      # T-06: Enforce WSS for audio fork in production
      - AUDIO_FORK_SCHEME=wss
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
        reservations:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  orchestrator:
    environment:
      - RUNTIME_PROFILE=production
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  bridge:
    environment:
      - AI_GRPC_TLS=true
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
