name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libboost-dev \
            libpjproject-dev \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libonnxruntime-dev \
            libspeexdsp-dev \
            libssl-dev \
            libspdlog-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Validate ops scripts
        run: |
          bash -n scripts/soak_outbound_api.sh scripts/validate_prod_env.sh scripts/e2e_outbound_null_audio.sh
          bash tests/test_validate_prod_env.sh
